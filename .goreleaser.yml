# goreleaser config for custodian — the external-credential vault pillar.
#
# custodian ships a standalone gRPC server binary (cmd/custodian) plus is imported
# as a Go library by nexus. On each `v*` tag push this produces cross-platform
# binaries + a source archive + checksums + an auto-generated changelog.

version: 2

project_name: custodian

before:
  hooks:
    - go mod tidy

builds:
  - id: custodian
    main: ./cmd/custodian
    binary: custodian
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

source:
  enabled: true
  format: tar.gz
  name_template: "{{ .ProjectName }}-source-{{ .Version }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "merge conflict"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: CarriedWorldUniverse
    name: custodian
  draft: false
  prerelease: auto
